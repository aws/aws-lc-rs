name: System Library Tests
# Tests linking aws-lc-sys against a pre-existing (system-installed) AWS-LC
# rather than building from the bundled source. Activated by the
# AWS_LC_SYS_SYSTEM_DIR environment variable.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build AWS-LC from the submodule into install prefixes that the test jobs
  # will consume via workflow artifacts.
  #
  # Fixture layout differs between Unix and Windows:
  #   * Unix:    static then shared are installed into the *same* `install/`
  #              prefix. The shared overlay adds libcrypto.{so,dylib} alongside
  #              the existing libcrypto.a without overwriting it, and the
  #              `share/rust/aws_lc_bindings.rs` file generated by the static
  #              build is preserved.
  #   * Windows: static and shared both produce `crypto.lib` (import lib for
  #              the shared build), so they cannot share a prefix. The shared
  #              build uses a separate `install-shared/` and is also built
  #              with `GENERATE_RUST_BINDINGS=ON` so the dynamic test row has
  #              bindings to consume.
  # ---------------------------------------------------------------------------
  build-aws-lc-unix:
    if: github.repository_owner == 'aws'
    name: Build AWS-LC (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64; macos-latest is arm64. Keep both so the
        # system-library path is exercised on both Apple architectures.
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'

      - name: Install bindgen-cli
        run: cargo install --force --locked bindgen-cli

      - name: Build and install AWS-LC (static) with Rust bindings
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-static --target install -j

      - name: Overlay shared libraries into the same prefix
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-shared --target install -j

      - name: Build and install AWS-LC with symbol prefix
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  SYMBOLS_FILE=x86_64-unknown-linux-gnu.txt ;;
            Linux-aarch64) SYMBOLS_FILE=aarch64-unknown-linux-gnu.txt ;;
            Darwin-x86_64) SYMBOLS_FILE=x86_64-apple-darwin.txt ;;
            Darwin-arm64)  SYMBOLS_FILE=aarch64-apple-darwin.txt ;;
            *) echo "Unsupported: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          # NOTE: BORINGSSL_PREFIX{,_SYMBOLS} requires Go for symbol-rename
          # codegen, so we must NOT pass -DDISABLE_GO=ON here (unlike the
          # static/shared builds above, which can use the pre-generated
          # sources shipped with AWS-LC).
          cmake -S aws-lc-sys/aws-lc -B build-prefixed \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DBORINGSSL_PREFIX=awslc_sys_test \
            -DBORINGSSL_PREFIX_SYMBOLS="${PWD}/aws-lc-sys/symbols/${SYMBOLS_FILE}" \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-prefixed"
          cmake --build build-prefixed --target install -j

      - name: Upload install artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aws-lc-install-${{ matrix.os }}
          path: |
            install/
            install-prefixed/
          retention-days: 1

  build-aws-lc-windows:
    if: github.repository_owner == 'aws'
    name: Build AWS-LC (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: ilammy/setup-nasm@v1

      - uses: seanmiddleditch/gha-setup-ninja@v6

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'

      - name: Install bindgen-cli
        run: cargo install --force --locked bindgen-cli

      - name: Build and install AWS-LC (static) with Rust bindings
        shell: bash
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-static \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-static --target install -j

      - name: Build and install AWS-LC (shared) with Rust bindings
        shell: bash
        run: |
          # On Windows, both the static library and the DLL import library are
          # named crypto.lib. Installing both into the same prefix would cause
          # the shared build to overwrite the static lib. Use a separate prefix
          # so static and dynamic tests each get an unambiguous install.
          cmake -S aws-lc-sys/aws-lc -B build-shared \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-shared"
          cmake --build build-shared --target install -j

      - name: Build and install AWS-LC with symbol prefix
        shell: bash
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-prefixed \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DBORINGSSL_PREFIX=awslc_sys_test \
            -DBORINGSSL_PREFIX_SYMBOLS="${PWD}/aws-lc-sys/symbols/x86_64-pc-windows-msvc.txt" \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-prefixed"
          cmake --build build-prefixed --target install -j

      - name: Upload install artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aws-lc-install-windows-latest
          path: |
            install/
            install-shared/
            install-prefixed/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Test matrix: each job downloads the pre-built AWS-LC install and exercises
  # one specific linking configuration.
  # ---------------------------------------------------------------------------
  test-unix:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-unix
    name: "Test: ${{ matrix.config.name }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64; macos-latest is arm64. Keep both so the
        # system-library path is exercised on both Apple architectures.
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
        config:
          - name: "aws-lc-rs, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-rs, dynamic"
            install_subdir: "install"
            static: "0"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-sys, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-sys, static, prefixed"
            install_subdir: "install-prefixed"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-rs, static, ssl"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --features aws-lc-sys/ssl --lib"
            cargo_cmd: "test"

    steps:
      # Intentionally do NOT initialize the aws-lc/ submodule. This makes the
      # from-source build path physically impossible, so a regression where
      # the system-library code path is silently bypassed will hard-fail rather
      # than fall through to a source build. Skipping the version check is
      # required because that path reads aws-lc/include/openssl/base.h.
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-${{ matrix.os }}
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Run cargo ${{ matrix.config.cargo_cmd }}
        env:
          AWS_LC_SYS_SYSTEM_DIR: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}
          AWS_LC_SYS_STATIC: ${{ matrix.config.static }}
          AWS_LC_SYS_SYSTEM_SKIP_VERSION_CHECK: "1"
          LD_LIBRARY_PATH: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}/lib
        run: |
          # Capture build output and assert the system-library code path was
          # actually entered. The build script emits `Using system-installed AWS-LC
          # from: <path>` via cargo:warning when SystemLib::link() runs;
          # its absence in the log indicates a silent fallback.
          set -o pipefail
          cargo ${{ matrix.config.cargo_cmd }} -vv ${{ matrix.config.cargo_args }} 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::System-library code path was not entered; aws-lc-sys silently fell back to building from source.'
            exit 1
          fi

  test-windows:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-windows
    name: "Test: ${{ matrix.config.name }} (windows-latest)"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "aws-lc-rs, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-rs, dynamic"
            install_subdir: "install-shared"
            static: "0"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-sys, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-sys, static, prefixed"
            install_subdir: "install-prefixed"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-rs, static, ssl"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --features aws-lc-sys/ssl --lib"
            cargo_cmd: "test"

    steps:
      # Intentionally do NOT initialize the aws-lc/ submodule (see test-unix).
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-windows-latest
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Run cargo ${{ matrix.config.cargo_cmd }}
        shell: bash
        env:
          AWS_LC_SYS_SYSTEM_DIR: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}
          AWS_LC_SYS_STATIC: ${{ matrix.config.static }}
          AWS_LC_SYS_SYSTEM_SKIP_VERSION_CHECK: "1"
        run: |
          # For dynamic linking, the DLLs must be on PATH
          if [ "$AWS_LC_SYS_STATIC" = "0" ]; then
            export PATH="${AWS_LC_SYS_SYSTEM_DIR}/bin:${AWS_LC_SYS_SYSTEM_DIR}/lib:${PATH}"
          fi
          # Capture build output and assert the system-library code path was
          # actually entered (see test-unix for rationale).
          set -o pipefail
          cargo ${{ matrix.config.cargo_cmd }} -vv ${{ matrix.config.cargo_args }} 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::System-library code path was not entered; aws-lc-sys silently fell back to building from source.'
            exit 1
          fi
