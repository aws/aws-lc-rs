name: System Library Tests
# Tests linking aws-lc-sys against a pre-existing (system-installed) AWS-LC
# rather than building from the bundled source. Activated by the
# AWS_LC_SYS_SYSTEM_DIR environment variable.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build AWS-LC from the submodule into install prefixes that the test jobs
  # will consume via workflow artifacts.
  #
  # Fixture layout differs between Unix and Windows:
  #   * Unix:    static then shared are installed into the *same* `install/`
  #              prefix. The shared overlay adds libcrypto.{so,dylib} alongside
  #              the existing libcrypto.a without overwriting it, and the
  #              `share/rust/aws_lc_bindings.rs` file generated by the static
  #              build is preserved.
  #   * Windows: static and shared both produce `crypto.lib` (import lib for
  #              the shared build), so they cannot share a prefix. The shared
  #              build uses a separate `install-shared/` and is also built
  #              with `GENERATE_RUST_BINDINGS=ON` so the dynamic test row has
  #              bindings to consume.
  # ---------------------------------------------------------------------------
  build-aws-lc-unix:
    if: github.repository_owner == 'aws'
    name: Build AWS-LC (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64; macos-latest is arm64. Keep both so the
        # system-library path is exercised on both Apple architectures.
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'

      - name: Install bindgen-cli
        run: cargo install --force --locked bindgen-cli

      - name: Build and install AWS-LC (static) with Rust bindings
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-static --target install -j

      - name: Overlay shared libraries into the same prefix
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-shared --target install -j

      - name: Build and install AWS-LC with symbol prefix
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  SYMBOLS_FILE=x86_64-unknown-linux-gnu.txt ;;
            Linux-aarch64) SYMBOLS_FILE=aarch64-unknown-linux-gnu.txt ;;
            Darwin-x86_64) SYMBOLS_FILE=x86_64-apple-darwin.txt ;;
            Darwin-arm64)  SYMBOLS_FILE=aarch64-apple-darwin.txt ;;
            *) echo "Unsupported: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          # NOTE: BORINGSSL_PREFIX{,_SYMBOLS} requires Go for symbol-rename
          # codegen, so we must NOT pass -DDISABLE_GO=ON here (unlike the
          # static/shared builds above, which can use the pre-generated
          # sources shipped with AWS-LC).
          cmake -S aws-lc-sys/aws-lc -B build-prefixed \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DBORINGSSL_PREFIX=awslc_sys_test \
            -DBORINGSSL_PREFIX_SYMBOLS="${PWD}/aws-lc-sys/symbols/${SYMBOLS_FILE}" \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-prefixed"
          cmake --build build-prefixed --target install -j

      - name: Build and install AWS-LC dist package without OpenSSL shim
        if: runner.os == 'Linux'
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-dist-pkg \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DENABLE_DIST_PKG=ON \
            -DENABLE_DIST_PKG_OPENSSL_SHIM=OFF \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-dist-pkg"
          cmake --build build-dist-pkg --target install -j

      - name: Upload install artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aws-lc-install-${{ matrix.os }}
          path: |
            install/
            install-prefixed/
            install-dist-pkg/
          retention-days: 1

  build-aws-lc-windows:
    if: github.repository_owner == 'aws'
    name: Build AWS-LC (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: ilammy/setup-nasm@v1

      - uses: seanmiddleditch/gha-setup-ninja@v6

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'

      - name: Install bindgen-cli
        run: cargo install --force --locked bindgen-cli

      - name: Build and install AWS-LC (static) with Rust bindings
        shell: bash
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-static \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install"
          cmake --build build-static --target install -j

      - name: Build and install AWS-LC (shared) with Rust bindings
        shell: bash
        run: |
          # On Windows, both the static library and the DLL import library are
          # named crypto.lib. Installing both into the same prefix would cause
          # the shared build to overwrite the static lib. Use a separate prefix
          # so static and dynamic tests each get an unambiguous install.
          cmake -S aws-lc-sys/aws-lc -B build-shared \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-shared"
          cmake --build build-shared --target install -j

      - name: Build and install AWS-LC with symbol prefix
        shell: bash
        run: |
          cmake -S aws-lc-sys/aws-lc -B build-prefixed \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DBORINGSSL_PREFIX=awslc_sys_test \
            -DBORINGSSL_PREFIX_SYMBOLS="${PWD}/aws-lc-sys/symbols/x86_64-pc-windows-msvc.txt" \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-prefixed"
          cmake --build build-prefixed --target install -j

      - name: Upload install artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aws-lc-install-windows-latest
          path: |
            install/
            install-shared/
            install-prefixed/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Test matrix: each job downloads the pre-built AWS-LC install and exercises
  # one specific linking configuration.
  # ---------------------------------------------------------------------------
  test-unix:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-unix
    name: "Test: ${{ matrix.config.name }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64; macos-latest is arm64. Keep both so the
        # system-library path is exercised on both Apple architectures.
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
        config:
          - name: "aws-lc-rs, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-rs, dynamic"
            install_subdir: "install"
            static: "0"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-sys, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-sys, static, prefixed"
            install_subdir: "install-prefixed"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-rs, static, ssl"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --features aws-lc-sys/ssl --lib"
            cargo_cmd: "test"

    steps:
      # Intentionally do NOT initialize the aws-lc/ submodule, then remove its
      # working tree outright. This makes the from-source build path physically
      # impossible, so a regression where the system-library code path is
      # silently bypassed hard-fails rather than falling through to a source
      # build. Removing the tree (rather than merely skipping init) stays robust
      # even if a future actions/checkout starts initializing submodules by
      # default. The version check still runs (it compares against a declared
      # minimum, not the submodule).
      - uses: actions/checkout@v7

      - name: Remove the AWS-LC submodule working tree
        shell: bash
        run: rm -rf aws-lc-sys/aws-lc

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-${{ matrix.os }}
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Run cargo ${{ matrix.config.cargo_cmd }}
        env:
          AWS_LC_SYS_SYSTEM_DIR: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}
          AWS_LC_SYS_STATIC: ${{ matrix.config.static }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}/lib
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}/lib
        run: |
          # Capture build output and assert the system-library code path was
          # actually entered. The build script emits `Using system-installed AWS-LC
          # from: <path>` via cargo:warning when SystemLib::link() runs;
          # its absence in the log indicates a silent fallback.
          set -o pipefail
          cargo ${{ matrix.config.cargo_cmd }} -vv ${{ matrix.config.cargo_args }} 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::System-library code path was not entered; aws-lc-sys silently fell back to building from source.'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Proves the declared minimum: build AWS-LC at MINIMUM_AWS_LC_VERSION (see
  # builder/system_library.rs) and run the full test suite against it with the
  # version check enabled. A failure means the minimum is unsupported and must
  # be raised together with this pin.
  # ---------------------------------------------------------------------------
  test-minimum-version:
    if: github.repository_owner == 'aws'
    name: "Test: declared minimum AWS-LC version"
    runs-on: ubuntu-latest
    env:
      # Keep in sync with MINIMUM_AWS_LC_VERSION in builder/system_library.rs.
      AWS_LC_MIN_VERSION: "v1.68.0"
    steps:
      # aws-lc-rs checkout WITHOUT the submodule, so a from-source fallback is
      # impossible (see test-unix).
      - uses: actions/checkout@v7

      - name: Remove the AWS-LC submodule working tree
        shell: bash
        run: rm -rf aws-lc-sys/aws-lc

      - name: Checkout AWS-LC at the declared minimum version
        uses: actions/checkout@v7
        with:
          repository: aws/aws-lc
          ref: ${{ env.AWS_LC_MIN_VERSION }}
          path: aws-lc-min-src

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install bindgen-cli
        run: cargo install --force --locked bindgen-cli

      - name: Build and install AWS-LC (static) with Rust bindings
        run: |
          cmake -S aws-lc-min-src -B build-min \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_TOOL=OFF \
            -DDISABLE_GO=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DGENERATE_RUST_BINDINGS=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/install-min"
          cmake --build build-min --target install -j

      - name: Run aws-lc-rs tests against the minimum install (version check enabled)
        env:
          AWS_LC_SYS_SYSTEM_DIR: ${{ github.workspace }}/install-min
          AWS_LC_SYS_STATIC: "1"
          LD_LIBRARY_PATH: ${{ github.workspace }}/install-min/lib
        run: |
          set -o pipefail
          cargo test -vv -p aws-lc-rs --lib 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::System-library code path was not entered; aws-lc-sys silently fell back to building from source.'
            exit 1
          fi

  test-windows:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-windows
    name: "Test: ${{ matrix.config.name }} (windows-latest)"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "aws-lc-rs, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-rs, dynamic"
            install_subdir: "install-shared"
            static: "0"
            cargo_args: "-p aws-lc-rs --lib"
            cargo_cmd: "test"

          - name: "aws-lc-sys, static"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-sys, static, prefixed"
            install_subdir: "install-prefixed"
            static: "1"
            cargo_args: "-p aws-lc-sys"
            cargo_cmd: "build"

          - name: "aws-lc-rs, static, ssl"
            install_subdir: "install"
            static: "1"
            cargo_args: "-p aws-lc-rs --features aws-lc-sys/ssl --lib"
            cargo_cmd: "test"

    steps:
      # Intentionally do NOT initialize the aws-lc/ submodule, and remove its
      # working tree outright (see test-unix). The version check still runs
      # against the installed version.
      - uses: actions/checkout@v7

      - name: Remove the AWS-LC submodule working tree
        shell: bash
        run: rm -rf aws-lc-sys/aws-lc

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-windows-latest
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Run cargo ${{ matrix.config.cargo_cmd }}
        shell: bash
        env:
          AWS_LC_SYS_SYSTEM_DIR: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}
          AWS_LC_SYS_STATIC: ${{ matrix.config.static }}
        run: |
          # For dynamic linking, the DLLs must be on PATH
          if [ "$AWS_LC_SYS_STATIC" = "0" ]; then
            export PATH="${AWS_LC_SYS_SYSTEM_DIR}/bin:${AWS_LC_SYS_SYSTEM_DIR}/lib:${PATH}"
          fi
          # Capture build output and assert the system-library code path was
          # actually entered (see test-unix for rationale).
          set -o pipefail
          cargo ${{ matrix.config.cargo_cmd }} -vv ${{ matrix.config.cargo_args }} 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::System-library code path was not entered; aws-lc-sys silently fell back to building from source.'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Auto-detection (Windows): with AWS_LC_SYS_SYSTEM_DIR *unset*, the build
  # script must still discover and link the pre-built AWS-LC via OPENSSL_DIR.
  # Static and shared installs live under separate prefixes on Windows, so this
  # also exercises automatic link-form selection without AWS_LC_SYS_STATIC. The
  # shared variant runs the aws-lc-rs test binary (a real link + DLL load); the
  # static variant builds aws-lc-sys.
  # ---------------------------------------------------------------------------
  test-autodetect-windows:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-windows
    name: "Autodetect: OPENSSL_DIR, ${{ matrix.config.name }} (windows-latest)"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "static"
            install_subdir: "install"
            dynamic: "0"
            cargo_cmd: "build"
            cargo_args: "-p aws-lc-sys"
          - name: "shared"
            install_subdir: "install-shared"
            dynamic: "1"
            cargo_cmd: "test"
            cargo_args: "-p aws-lc-rs --lib"
    steps:
      # No submodule: a missed detection cannot fall through to a source build.
      - uses: actions/checkout@v7

      - name: Remove the AWS-LC submodule working tree
        shell: bash
        run: rm -rf aws-lc-sys/aws-lc

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-windows-latest
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Auto-detect via OPENSSL_DIR and assert adoption
        shell: bash
        env:
          OPENSSL_DIR: ${{ github.workspace }}/aws-lc-artifacts/${{ matrix.config.install_subdir }}
        run: |
          if [ "${{ matrix.config.dynamic }}" = "1" ]; then
            export PATH="$OPENSSL_DIR/bin:$OPENSSL_DIR/lib:${PATH}"
          fi
          set -o pipefail
          # The shared variant runs the aws-lc-rs test binary (real link + DLL
          # load); the static variant builds aws-lc-sys.
          cargo ${{ matrix.config.cargo_cmd }} -vv ${{ matrix.config.cargo_args }} 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::Auto-detection did not adopt the system AWS-LC (system-library code path not entered).'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Auto-detection (Unix): with AWS_LC_SYS_SYSTEM_DIR *unset*, the build script
  # must still discover and link the pre-built AWS-LC via the generic OPENSSL_*
  # variables and pkg-config. The aws-lc/ submodule is intentionally not
  # initialized, so a failure to auto-detect cannot silently fall back to a
  # source build -- it hard-fails here.
  # ---------------------------------------------------------------------------
  test-autodetect-unix:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-unix
    name: "Autodetect: ${{ matrix.config.name }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
        config:
          - name: "OPENSSL_DIR"
            mechanism: openssl_dir
          - name: "OPENSSL_INCLUDE_DIR + OPENSSL_LIB_DIR (split prefixes)"
            mechanism: openssl_split
          - name: "pkg-config"
            mechanism: pkgconfig
        include:
          - os: ubuntu-latest
            config:
              name: "pkg-config (AWS-LC dist package)"
              mechanism: pkgconfig_dist
    steps:
      # No submodule: a missed detection cannot fall through to a source build.
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-${{ matrix.os }}
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: "Detect via ${{ matrix.config.name }} and assert adoption"
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/aws-lc-artifacts
          AWS_LC_SYS_STATIC: "1"
        run: |
          set -eo pipefail
          install_dir="$ARTIFACTS_DIR/install"

          setup_pkg_config_path() {
            local pc_prefix="$1"
            # .pc files embed the build-time prefix; rewrite it to the
            # downloaded location so pkg-config reports valid paths.
            local found=
            for d in "$pc_prefix/lib/pkgconfig" "$pc_prefix/lib64/pkgconfig"; do
              [ -d "$d" ] || continue
              for pc in "$d"/*.pc; do
                [ -f "$pc" ] && sed -i.bak "s|^prefix=.*|prefix=$pc_prefix|" "$pc"
              done
              export PKG_CONFIG_PATH="$d:${PKG_CONFIG_PATH:-}"
              found=1
            done
            if [ -z "$found" ]; then
              echo '::error::No pkgconfig directory in the install; cannot exercise pkg-config detection.'
              exit 1
            fi
          }

          case "${{ matrix.config.mechanism }}" in
            openssl_dir)
              export OPENSSL_DIR="$install_dir"
              ;;
            openssl_split)
              split_root="$RUNNER_TEMP/aws-lc-split"
              include_prefix="$split_root/include-prefix"
              lib_prefix="$split_root/lib-prefix"
              mkdir -p "$include_prefix" "$lib_prefix"
              cp -R "$install_dir/include" "$include_prefix/"
              cp -R "$install_dir/share" "$include_prefix/"
              cp -R "$install_dir/lib" "$lib_prefix/"

              export OPENSSL_INCLUDE_DIR="$include_prefix/include"
              export OPENSSL_LIB_DIR="$lib_prefix/lib"
              ;;
            pkgconfig)
              setup_pkg_config_path "$install_dir"
              ;;
            pkgconfig_dist)
              install_dir="$ARTIFACTS_DIR/install-dist-pkg"
              setup_pkg_config_path "$install_dir"
              ;;
          esac
          cargo build -vv -p aws-lc-sys 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::Auto-detection did not adopt the system AWS-LC (system-library code path not entered).'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Auto-detection (Unix, shared + final link): test-autodetect-unix forces the
  # static link form and only `cargo build`s aws-lc-sys (an rlib, never finally
  # linked). This job closes that gap on Linux by forcing the *shared* link form
  # (AWS_LC_SYS_STATIC=0) and running the aws-lc-rs test binary, so a real
  # executable is linked and loads the auto-detected libcrypto.so discovered via
  # pkg-config. LD_LIBRARY_PATH lets the test binary find the .so at runtime.
  # ---------------------------------------------------------------------------
  test-autodetect-shared-unix:
    if: github.repository_owner == 'aws'
    needs: build-aws-lc-unix
    name: "Autodetect: pkg-config, shared + run (ubuntu-latest)"
    runs-on: ubuntu-latest
    steps:
      # No submodule: a missed detection cannot fall through to a source build.
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Download AWS-LC install
        uses: actions/download-artifact@v8
        with:
          name: aws-lc-install-ubuntu-latest
          path: ${{ github.workspace }}/aws-lc-artifacts

      - name: Detect via pkg-config (shared) and assert adoption + run
        env:
          INSTALL_DIR: ${{ github.workspace }}/aws-lc-artifacts/install
          AWS_LC_SYS_STATIC: "0"
          LD_LIBRARY_PATH: ${{ github.workspace }}/aws-lc-artifacts/install/lib
        run: |
          set -eo pipefail
          # .pc files embed the build-time prefix; rewrite it to the downloaded
          # location so pkg-config reports valid paths.
          found=
          for d in "$INSTALL_DIR/lib/pkgconfig" "$INSTALL_DIR/lib64/pkgconfig"; do
            [ -d "$d" ] || continue
            for pc in "$d"/*.pc; do
              [ -f "$pc" ] && sed -i.bak "s|^prefix=.*|prefix=$INSTALL_DIR|" "$pc"
            done
            export PKG_CONFIG_PATH="$d:${PKG_CONFIG_PATH:-}"
            found=1
          done
          if [ -z "$found" ]; then
            echo '::error::No pkgconfig directory in the install; cannot exercise pkg-config detection.'
            exit 1
          fi
          # A shared build co-installs libcrypto.so alongside the static .a in
          # the same prefix, so AWS_LC_SYS_STATIC=0 selects the dynamic form.
          cargo test -vv -p aws-lc-rs --lib 2>&1 | tee cargo.log
          if ! grep -q 'Using system-installed AWS-LC from' cargo.log; then
            echo '::error::Auto-detection did not adopt the system AWS-LC (system-library code path not entered).'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # AWS_LC_SYS_USE_SYSTEM=1 must hard-fail when no system AWS-LC is discoverable,
  # rather than falling back to a source build.
  # ---------------------------------------------------------------------------
  test-autodetect-require-unix:
    if: github.repository_owner == 'aws'
    name: "Autodetect: USE_SYSTEM=1 requires an install"
    runs-on: ubuntu-latest
    steps:
      # No submodule and no system AWS-LC: detection must find nothing.
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Assert the build fails when no system AWS-LC is present
        env:
          AWS_LC_SYS_USE_SYSTEM: "1"
        run: |
          set -o pipefail
          if cargo build -vv -p aws-lc-sys 2>&1 | tee cargo.log; then
            echo '::error::Expected the build to fail (USE_SYSTEM=1, no system AWS-LC), but it succeeded.'
            exit 1
          fi
          if ! grep -q 'requires a system-installed AWS-LC' cargo.log; then
            echo '::error::Build failed, but not with the expected USE_SYSTEM=1 error.'
            exit 1
          fi
